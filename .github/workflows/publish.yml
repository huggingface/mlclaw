name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_image:
        description: "Also build and push the runtime image"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - id: package-version
        shell: bash
        run: |
          version="$(node -p 'require("./package.json").version')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run check:secrets
      - run: npm run pack:check
      - run: npm publish --access public --provenance
      - name: Log in to GHCR
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish runtime image
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/huggingclaw-runtime:latest
            ghcr.io/${{ github.repository_owner }}/huggingclaw-runtime:${{ steps.package-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/huggingclaw-runtime:v${{ steps.package-version.outputs.version }}
